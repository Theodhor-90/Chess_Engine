name: Release Build

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            simd: simd-sse2
            os: ubuntu-latest
            use_cross: false
          - target: x86_64-unknown-linux-gnu
            simd: simd-avx2
            os: ubuntu-latest
            use_cross: false
          - target: x86_64-apple-darwin
            simd: simd-sse2
            os: macos-13
            use_cross: false
          - target: x86_64-apple-darwin
            simd: simd-avx2
            os: macos-13
            use_cross: false
          - target: x86_64-pc-windows-msvc
            simd: simd-sse2
            os: windows-latest
            use_cross: false
          - target: x86_64-pc-windows-msvc
            simd: simd-avx2
            os: windows-latest
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            simd: simd-neon
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-apple-darwin
            simd: simd-neon
            os: macos-latest
            use_cross: false

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --locked

      - name: Preflight — cargo fmt
        if: matrix.use_cross == false
        run: cargo fmt --check

      - name: Preflight — cargo clippy
        if: matrix.use_cross == false
        run: cargo clippy -- -D warnings

      - name: Preflight — cargo test
        if: matrix.use_cross == false
        run: cargo test

      - name: Build release binary
        if: matrix.use_cross == false
        run: cargo build --release -p engine --target ${{ matrix.target }} --features ${{ matrix.simd }}

      - name: Build release binary (cross)
        if: matrix.use_cross == true
        run: cross build --release -p engine --target ${{ matrix.target }} --features ${{ matrix.simd }}

      - name: Upload artifact (Unix)
        if: matrix.target != 'x86_64-pc-windows-msvc'
        uses: actions/upload-artifact@v4
        with:
          name: engine-${{ matrix.target }}-${{ matrix.simd }}
          path: target/${{ matrix.target }}/release/engine

      - name: Upload artifact (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        uses: actions/upload-artifact@v4
        with:
          name: engine-${{ matrix.target }}-${{ matrix.simd }}
          path: target/${{ matrix.target }}/release/engine.exe
